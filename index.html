<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .student-card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="card student-card" style="width: 22rem;">
        <div class="card-body text-center">
            <h5 class="card-title text-primary">Student Profile</h5>
            <hr>
            <p class="card-text"><strong>Name:</strong> {{ student.name }}</p>
            <p class="card-text"><strong>Grade:</strong> {{ student.grade }}</p>
            <p class="card-text"><strong>Section:</strong> {{ student.section }}</p>
            <a href="/student" class="btn btn-outline-secondary btn-sm">View Raw JSON</a>
        </div>
    </div>

</body>
</html>
